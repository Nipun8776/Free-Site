<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#050507">
    <meta name="display" content="standalone">
    
    <title>SpendX - Premium Financial Manager</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #050507; 
            --glass-bg: rgba(18, 18, 24, 0.7);
            --glass-border: rgba(34, 211, 238, 0.12);
            --neon-cyan: #22d3ee;
        }

        body {
            -webkit-user-select: none; user-select: none; touch-action: pan-y;
            background-color: var(--bg-color); color: #f8fafc;
            font-family: 'Poppins', sans-serif; margin: 0; overflow-x: hidden;
            background-image: linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        input, button, select, optgroup, option {
            -webkit-user-select: auto; user-select: auto; touch-action: manipulation; font-family: 'Poppins', sans-serif;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .ultra-glass {
            background: var(--glass-bg);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.03);
        }

        .glass-input {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: white; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-input:focus {
            background: rgba(0, 0, 0, 0.7);
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px rgba(34, 211, 238, 0.25); outline: none;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeScale 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeScale { from { opacity: 0; transform: scale(0.99) translateY(8px); } to { opacity: 1; transform: scale(1) translateY(0); } }

        .pop-down { animation: popDown 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; transform-origin: top; }
        @keyframes popDown { from { opacity: 0; transform: scaleY(0.9) translateY(-10px); } to { opacity: 1; transform: scaleY(1) translateY(0); } }

        .swal2-popup {
            background: rgba(10, 10, 14, 0.98) !important; backdrop-filter: blur(20px) !important;
            border: 1px solid var(--glass-border) !important; color: #fff !important; border-radius: 20px !important;
        }
        
        select option { background: #121218; color: #f8fafc; font-weight: 500; }

        @keyframes professionalFade {
            0% { opacity: 0; filter: blur(3px); }
            100% { opacity: 1; filter: blur(0px); }
        }
        .chart-anim-fade { animation: professionalFade 0.6s ease-out forwards; }

        #navMenu { transition: opacity 0.2s, transform 0.2s; transform-origin: top right; }
        #navMenu.hidden-menu { opacity: 0; pointer-events: none; transform: scale(0.95) translateY(-10px); }

        @keyframes progress-slide {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(200%); }
        }
        .animate-progress { animation: progress-slide 1.5s ease-in-out infinite; }

        /* Colorful Glowing Lights for Report Generation */
        @keyframes glowingLights {
            0% { transform: scale(0.8) translate(0, 0); opacity: 0.4; }
            50% { transform: scale(1.3) translate(20px, -20px); opacity: 0.8; }
            100% { transform: scale(0.8) translate(0, 0); opacity: 0.4; }
        }
        .glow-light-1 { animation: glowingLights 4s infinite ease-in-out; }
        .glow-light-2 { animation: glowingLights 5s infinite ease-in-out 1s; }
        .glow-light-3 { animation: glowingLights 6s infinite ease-in-out 2s; }
    </style>
</head>
<body class="min-h-screen flex flex-col pb-10">

    <div id="downloadOverlay" class="fixed inset-0 z-[100] hidden bg-black/90 backdrop-blur-2xl flex-col items-center justify-center overflow-hidden">
        <div class="absolute w-[350px] h-[350px] bg-rose-500/50 rounded-full blur-[90px] glow-light-1" style="top:-10%; left:-10%;"></div>
        <div class="absolute w-[400px] h-[400px] bg-cyan-500/50 rounded-full blur-[100px] glow-light-2" style="bottom:-15%; right:-15%;"></div>
        <div class="absolute w-[300px] h-[300px] bg-purple-600/50 rounded-full blur-[80px] glow-light-3" style="top:40%; left:30%;"></div>
        
        <div class="relative w-20 h-20 mb-6 flex items-center justify-center z-10">
            <div class="absolute inset-0 border-4 border-cyan-500/20 rounded-full"></div>
            <div class="absolute inset-0 border-4 border-cyan-400 rounded-full border-t-transparent animate-spin" style="animation-duration: 1s;"></div>
            <i class="fa-solid fa-file-invoice text-cyan-400 text-2xl animate-pulse"></i>
        </div>
        <div class="text-cyan-400 font-mono tracking-[0.2em] font-bold text-sm animate-pulse mb-3 z-10 text-center">GENERATING REPORT...</div>
        <div class="w-48 h-1 bg-white/10 rounded-full overflow-hidden relative z-10">
            <div class="absolute top-0 bottom-0 left-0 w-1/2 bg-cyan-400 rounded-full animate-progress shadow-[0_0_15px_rgba(34,211,238,0.9)]"></div>
        </div>
    </div>

    <header class="sticky top-0 z-40 px-5 py-4 flex justify-between items-center bg-zinc-950/60 backdrop-blur-xl border-b border-white/5 relative">
        <div>
            <h1 class="text-2xl font-black tracking-wider text-white flex items-center select-none">
                <i class="fa-solid fa-wallet text-cyan-400 mr-2 drop-shadow-[0_0_10px_rgba(34,211,238,0.5)]"></i>Spend<span class="text-cyan-400">X</span>
            </h1>
            <div id="headerLiveDate" class="text-[10px] text-slate-400 font-semibold uppercase tracking-wider mt-0.5"></div>
        </div>
        <div class="flex items-center gap-4">
            <button onclick="downloadCurrentMonthReport()" class="text-[10px] uppercase tracking-widest bg-cyan-500/10 hover:bg-cyan-500/20 border border-cyan-500/30 text-cyan-300 font-black px-4 py-2.5 rounded-full transition-all active:scale-95 flex items-center gap-2 shadow-[0_0_10px_rgba(34,211,238,0.1)]">
                <i class="fa-solid fa-download"></i> Report
            </button>
            <button onclick="toggleFullScreen()" class="text-slate-300 hover:text-cyan-400 text-lg transition-colors">
                <i class="fa-solid fa-expand"></i>
            </button>
            <button onclick="toggleMenu()" class="text-white hover:text-cyan-400 text-xl transition-colors ml-2">
                <i class="fa-solid fa-bars"></i>
            </button>
        </div>
        
        <div id="navMenu" class="hidden-menu absolute right-4 top-16 ultra-glass w-48 p-2 rounded-xl border border-cyan-500/30 shadow-[0_10px_40px_rgba(0,0,0,0.8)] z-50">
            <button onclick="switchTab('dashboard')" class="w-full text-left px-4 py-3 rounded-lg text-sm font-bold text-white hover:bg-cyan-500/20 hover:text-cyan-400 transition-all flex items-center gap-3">
                <i class="fa-solid fa-chart-pie w-5 text-center"></i> Dashboard
            </button>
        </div>
    </header>

    <main class="container mx-auto px-4 mt-5 w-full max-w-md flex-1">
        
        <div id="tab-dashboard" class="tab-content active space-y-5">
            <div class="ultra-glass p-4 relative overflow-hidden flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div id="healthScoreCircle" class="w-10 h-10 rounded-full border-4 border-cyan-400 flex items-center justify-center text-white font-black text-xs shadow-[0_0_10px_rgba(34,211,238,0.5)]">
                        100
                    </div>
                    <div>
                        <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest">Health Score</p>
                        <h2 id="daysLeftCounter" class="text-[11px] font-black text-cyan-400 tracking-wide mt-0.5">Calculating...</h2>
                    </div>
                </div>
                <select id="monthFilter" onchange="updateAllUI()" class="bg-black/60 border border-white/10 text-cyan-400 text-[11px] font-black rounded-lg px-2.5 py-1.5 outline-none focus:border-cyan-400 cursor-pointer uppercase tracking-wider"></select>
            </div>

            <div id="smartAlertContainer"></div>

            <div class="grid grid-cols-2 gap-3">
                <div class="ultra-glass rounded-2xl p-4 border-t-2 border-cyan-400 flex flex-col justify-center">
                    <p class="text-[9px] text-slate-400 font-bold mb-1 uppercase tracking-widest"><i class="fa-solid fa-sack-dollar text-cyan-400 mr-1"></i> Salary / Budget</p>
                    <h3 class="text-lg font-black text-white" id="dispSalary">0.00</h3>
                </div>
                <div class="ultra-glass rounded-2xl p-4 border-t-2 border-emerald-400 flex flex-col justify-center">
                    <p class="text-[9px] text-slate-400 font-bold mb-1 uppercase tracking-widest"><i class="fa-solid fa-wallet text-emerald-400 mr-1"></i> Balance</p>
                    <h3 class="text-lg font-black text-emerald-400 drop-shadow-[0_0_8px_rgba(52,211,153,0.4)]" id="dispBalance">0.00</h3>
                </div>
                <div class="ultra-glass rounded-2xl p-4 border-t-2 border-rose-500 flex flex-col justify-center">
                    <p class="text-[9px] text-slate-400 font-bold mb-1 uppercase tracking-widest"><i class="fa-solid fa-fire text-rose-500 mr-1"></i> Spent</p>
                    <h3 class="text-base font-black text-rose-400" id="dispExpense">0.00</h3>
                    <p class="text-[9px] text-slate-500 mt-1 font-semibold" id="dispDailyAvg">Avg: 0.00 / day</p>
                </div>
                <div class="ultra-glass rounded-2xl p-4 border-t-2 border-purple-500 flex flex-col justify-center">
                    <p class="text-[9px] text-slate-400 font-bold mb-1 uppercase tracking-widest"><i class="fa-solid fa-piggy-bank text-purple-400 mr-1"></i> Savings</p>
                    <h3 class="text-base font-black text-purple-400" id="dispSavings">0.00</h3>
                    <p class="text-[9px] text-slate-500 mt-1 font-semibold" id="dispPrediction">Est: 0.00 by EOM</p>
                </div>
            </div>

            <div class="ultra-glass rounded-2xl p-5 flex flex-col justify-between h-auto min-h-[280px] relative overflow-hidden" ontouchstart="handleTouchStart(event)" ontouchend="handleTouchEnd(event)">
                <div class="flex justify-between items-center mb-3 z-10">
                    <div><h4 id="chartTitle" class="text-[11px] font-extrabold text-cyan-400 tracking-wider uppercase drop-shadow-md">Loading Graph...</h4></div>
                    
                    <label class="relative inline-flex items-center cursor-pointer z-50">
                        <input type="checkbox" id="autoChartToggle" class="sr-only peer" checked onchange="toggleAutoChart()">
                        <div class="w-7 h-4 bg-white/10 rounded-full peer peer-checked:after:translate-x-[12px] after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-slate-300 peer-checked:after:bg-cyan-400 after:rounded-full after:h-3 after:w-3 after:transition-all peer-checked:bg-cyan-500/20 border border-white/5"></div>
                        <span class="ml-1.5 text-[8px] font-bold uppercase tracking-widest text-slate-300 peer-checked:text-cyan-400 transition-colors">Auto</span>
                    </label>
                </div>

                <div id="canvasWrapper" class="flex-1 relative flex items-center justify-center max-h-[180px] mt-8 chart-anim-fade">
                    <canvas id="mainChart"></canvas>
                </div>
                <div class="flex justify-center items-center gap-2 mt-4 z-10">
                    <span id="chartDot-0" class="w-1.5 h-1.5 rounded-full transition-all duration-300 bg-zinc-700"></span>
                    <span id="chartDot-1" class="w-1.5 h-1.5 rounded-full transition-all duration-300 bg-zinc-700"></span>
                    <span id="chartDot-2" class="w-1.5 h-1.5 rounded-full transition-all duration-300 bg-zinc-700"></span>
                </div>
            </div>

            <div id="actionButtonsRow" class="grid grid-cols-2 gap-3 mt-4">
                <button onclick="toggleActionBox('salary')" class="bg-cyan-500/10 border border-cyan-500/30 text-cyan-400 py-3.5 rounded-2xl font-bold text-[11px] uppercase tracking-widest flex justify-center items-center gap-2 hover:bg-cyan-500/20 transition-all active:scale-95 shadow-[0_0_15px_rgba(34,211,238,0.1)]">
                    <i class="fa-solid fa-sack-dollar text-sm"></i> Add Salary
                </button>
                <button onclick="toggleActionBox('expense')" class="bg-emerald-500/10 border border-emerald-500/30 text-emerald-400 py-3.5 rounded-2xl font-bold text-[11px] uppercase tracking-widest flex justify-center items-center gap-2 hover:bg-emerald-500/20 transition-all active:scale-95 shadow-[0_0_15px_rgba(52,211,153,0.1)]">
                    <i class="fa-solid fa-plus-circle text-sm"></i> Add Expense
                </button>
            </div>

            <div id="addSalaryBox" class="hidden ultra-glass p-5 mt-2 border-l-4 border-cyan-500 pop-down">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-[12px] font-black text-white uppercase tracking-widest flex items-center"><i class="fa-solid fa-sack-dollar text-cyan-400 mr-2"></i>Set Monthly Salary</h2>
                    <button onclick="toggleActionBox('close')" class="text-slate-400 hover:text-rose-500 bg-white/5 w-8 h-8 rounded-full flex items-center justify-center transition-colors"><i class="fa-solid fa-xmark text-sm"></i></button>
                </div>
                <div class="flex gap-3">
                    <input type="number" step="0.01" inputmode="decimal" id="salaryInput" placeholder="Amount (Rs)" class="w-full glass-input rounded-xl px-4 py-3 font-bold text-base" min="0">
                    <button onclick="setSalary()" class="bg-cyan-400 text-black px-6 py-3 rounded-xl font-black text-xs uppercase tracking-widest transition-transform active:scale-95 shadow-[0_0_15px_rgba(34,211,238,0.3)]">Save</button>
                </div>
            </div>

            <div id="addExpenseBox" class="hidden ultra-glass p-5 mt-2 border-l-4 border-emerald-500 pop-down">
                <div class="flex justify-between items-center mb-3">
                    <h2 class="text-[12px] font-black text-white uppercase tracking-widest flex items-center"><i class="fa-solid fa-plus text-emerald-400 mr-2"></i>Record New Expense</h2>
                    <button onclick="toggleActionBox('close')" class="text-slate-400 hover:text-rose-500 bg-white/5 w-8 h-8 rounded-full flex items-center justify-center transition-colors"><i class="fa-solid fa-xmark text-sm"></i></button>
                </div>
                <div id="popularSubCatsWrapper" class="mb-3 hidden"><div id="popularSubCats" class="flex overflow-x-auto gap-2 pb-2 no-scrollbar snap-x"></div></div>
                <div class="space-y-3">
                    <div>
                        <div class="flex justify-between items-center mb-1 ml-1 pr-1">
                            <label class="text-[9px] text-slate-400 uppercase font-bold tracking-wider block">Category</label>
                            <button onclick="openCatModal()" class="text-[9px] text-cyan-400 hover:text-cyan-300 font-bold uppercase tracking-widest flex items-center gap-1 transition-all"><i class="fa-solid fa-gear"></i> Manage</button>
                        </div>
                        <select id="mainCategorySelect" onchange="handleMainCategoryChange()" class="w-full glass-input rounded-xl px-3 py-3 text-xs font-semibold cursor-pointer"></select>
                    </div>
                    <div>
                        <label class="text-[9px] text-slate-400 uppercase font-bold tracking-wider ml-1 mb-1 block">Sub Category</label>
                        <select id="subCategorySelect" class="w-full glass-input rounded-xl px-3 py-3 text-xs font-medium cursor-pointer"></select>
                    </div>
                    <div>
                        <label class="text-[9px] text-slate-400 uppercase font-bold tracking-wider ml-1 mb-1 block">Expense Date</label>
                        <input type="date" id="expDate" class="w-full glass-input rounded-xl px-3 py-3 text-xs">
                    </div>

                    <div class="flex gap-3 mt-1">
                        <input type="number" step="0.01" inputmode="decimal" id="expAmount" placeholder="Amount (Rs)" class="w-full glass-input rounded-xl px-4 py-3 font-bold text-base" min="0">
                        <button onclick="addExpense()" class="bg-emerald-500 text-black px-8 py-3 rounded-xl font-black text-xs uppercase tracking-widest active:scale-95 shadow-[0_0_15px_rgba(52,211,153,0.3)]">Save</button>
                    </div>
                </div>
            </div>

            <div class="ultra-glass p-5">
                <h3 class="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-4"><i class="fa-solid fa-layer-group text-cyan-400 mr-2"></i>Category Breakdown</h3>
                <div id="categoryBreakdown" class="space-y-3"></div>
            </div>

            <div class="mt-8">
                <div class="relative mb-3">
                    <i class="fa-solid fa-search absolute left-4 top-3.5 text-slate-500 text-xs"></i>
                    <input type="text" id="searchExpense" onkeyup="updateAllUI()" placeholder="Search expenses..." class="w-full glass-input rounded-xl pl-10 pr-4 py-2.5 text-xs font-medium">
                </div>
                <div class="ultra-glass p-2 rounded-2xl no-scrollbar" id="expenseList"></div>
            </div>
        </div>

    </main>

    <div id="catModal" class="fixed inset-0 z-50 hidden bg-black/80 backdrop-blur-md flex justify-center items-end sm:items-center p-0 sm:p-4 transition-all pb-0 sm:pb-4">
        <div class="ultra-glass w-full max-w-md w-full h-[80vh] sm:h-auto sm:max-h-[85vh] rounded-t-3xl sm:rounded-3xl flex flex-col pop-down border-b-0 sm:border-b">
            <div class="p-5 flex justify-between items-center border-b border-white/10">
                <h3 class="text-white font-black uppercase tracking-widest text-[13px]"><i class="fa-solid fa-layer-group text-cyan-400 mr-2"></i> Manage Categories</h3>
                <button onclick="closeCatModal()" class="w-8 h-8 rounded-full bg-white/5 text-slate-400 hover:text-rose-400 flex items-center justify-center transition-all"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="flex-1 overflow-y-auto no-scrollbar p-5 space-y-4" id="catModalBody"></div>
            <div class="p-4 border-t border-white/10 bg-black/20 flex gap-3">
                <button onclick="resetCategoriesToDefault()" class="flex-1 bg-rose-500/10 text-rose-400 border border-rose-500/30 py-3 rounded-xl font-bold text-xs uppercase tracking-widest hover:bg-rose-500/20 active:scale-95 transition-all"><i class="fa-solid fa-rotate-left mr-1.5"></i>Reset Defaults</button>
                <button onclick="addNewMainCat()" class="flex-[1.5] bg-cyan-500/10 text-cyan-400 border border-cyan-500/30 py-3 rounded-xl font-bold text-xs uppercase tracking-widest hover:bg-cyan-500/20 active:scale-95 transition-all"><i class="fa-solid fa-plus mr-1.5"></i>New Main</button>
            </div>
        </div>
    </div>

    <script>
        const defaultCategoryMapping = {
            "🍔 Food & Drinks": ["Groceries", "Restaurants", "Fast Food", "Food Delivery", "Bakery", "Coffee & Tea", "Snacks", "Lunch", "Dinner"],
            "🚗 Transport": ["Fuel", "Bus & Train", "Taxi / Tuk", "Vehicle Service", "Car Wash", "Insurance"],
            "🏠 Housing & Utilities": ["Rent", "Electricity", "Water Bill", "Internet Connection", "Home Repairs", "Furniture"],
            "🛍️ Shopping": ["Clothing", "Shoes & Bags", "Electronics", "Gifts & Toys", "Online Purchases"],
            "🏥 Healthcare": ["Doctor Visits", "Medicine Bills", "Dental Care", "Health Insurance", "Fitness & Gym"],
            "📚 Education": ["Tuition Fees", "School / Uni Fees", "Books & Stationery", "Online Courses"],
            "📱 Bills & Subs": ["Mobile Reload", "Netflix & Spotify", "Cloud Storage", "Gym Memberships"],
            "🎬 Entertainment": ["Movies", "Games", "Live Music", "Hobbies & Recreation", "Nightlife"],
            "👨‍👩‍👧‍👦 Family & Social": ["Family Support", "Donations", "Gifts for Friends", "Wedding Events", "Parties"],
            "✈️ Travel": ["Flight Tickets", "Hotel Booking", "Sightseeing", "Visa Fees"],
            "💰 Savings": ["Savings Deposit", "Emergency Fund", "FD Investment", "Crypto & Stocks"],
            "🧴 Personal Care": ["Haircut & Salon", "Cosmetics", "Skincare", "Massage & Spa"],
            "📦 Other / Misc": ["Bank Fees", "Unexpected Fines", "Office Supplies", "Miscellaneous Costs"]
        };

        const syncPalette = [
            { hex: "#22d3ee", grad: "from-cyan-400 to-blue-500" }, { hex: "#d946ef", grad: "from-fuchsia-500 to-purple-500" },
            { hex: "#34d399", grad: "from-emerald-400 to-teal-500" }, { hex: "#f43f5e", grad: "from-rose-500 to-red-500" },
            { hex: "#fbbf24", grad: "from-amber-400 to-orange-500" }, { hex: "#84cc16", grad: "from-lime-400 to-green-500" },
            { hex: "#ec4899", grad: "from-pink-500 to-rose-400" }, { hex: "#818cf8", grad: "from-indigo-400 to-blue-600" }
        ];

        let appData = { salary: 0, expenses: [], usageCounts: {} }; 
        let appPrefs = { chartMode: 0, tab: 'dashboard' };
        let categoryMapping = {};
        let myChart = null;
        let currentChartMode = 0; 
        
        let touchStartX = 0, touchStartY = 0, touchEndX = 0, touchEndY = 0;

        let isAutoChartPlay = true;
        let autoChartTimerId = null;
        let tooltipIntervalId = null;
        let currentTooltipIndex = -1;
        window.manualTooltipHideId = null;

        const AppDB = {
            async load() {
                return new Promise((resolve) => {
                    try { 
                        const savedCats = localStorage.getItem('SpendX_CatMap_v2');
                        categoryMapping = savedCats ? JSON.parse(savedCats) : JSON.parse(JSON.stringify(defaultCategoryMapping));
                    } catch (e) { categoryMapping = JSON.parse(JSON.stringify(defaultCategoryMapping)); }
                    
                    try { 
                        const data = localStorage.getItem('SpendXData_ULTIMATE_v2'); 
                        if (data) {
                            let parsed = JSON.parse(data);
                            if(parsed.budget !== undefined) { parsed.salary = parsed.budget; delete parsed.budget; } 
                            appData.salary = parsed.salary || 0;
                            appData.expenses = parsed.expenses || [];
                            appData.usageCounts = parsed.usageCounts || {};
                        }
                    } catch (e) {}

                    try {
                        const prefs = localStorage.getItem('SpendX_Prefs_v2');
                        if (prefs) appPrefs = JSON.parse(prefs);
                        currentChartMode = appPrefs.chartMode || 0;
                    } catch (e) {}
                    resolve(true);
                });
            },
            async save() {
                return new Promise((resolve) => {
                    localStorage.setItem('SpendXData_ULTIMATE_v2', JSON.stringify(appData));

            const cancelFullScreen = doc.exitFullscreen || doc.mozCancelFullScreen || doc.webkitExitFullscreen || doc.msExitFullscreen;

            if (!doc.fullscreenElement && !doc.mozFullScreenElement && !doc.webkitFullscreenElement && !doc.msFullscreenElement) {
                if (requestFullScreen) {

                }
            } else {

        function handleTouchStart(e) { 
            touchStartX = e.changedTouches ? e.changedTouches[0].screenX : e.screenX; 
            touchStartY = e.changedTouches ? e.changedTouches[0].screenY : e.screenY; 
        }
        
        function handleTouchEnd(e) { 
            touchEndX = e.changedTouches ? e.changedTouches[0].screenX : e.screenX; 
            touchEndY = e.changedTouches ? e.changedTouches[0].screenY : e.screenY; 
            handleSwipe(); 
        }
        
        function handleSwipe() {
            const swipeThreshold = 40;
            const deltaX = touchEndX - touchStartX;
            const deltaY = touchEndY - touchStartY;
            
            if (Math.abs(deltaX) > Math.abs(deltaY) && Math.abs(deltaX) > swipeThreshold) {
                if(isAutoChartPlay) startAutoChartTimers(); 
                if (deltaX < 0) rotateChart('left'); 
                else rotateChart('right'); 
            }
        }

        function formatBeautifulDate(dateStr) {
            if(!dateStr) return '';

            const day = d.getDate();
            const nth = function(d) {
                if (d > 3 && d < 21) return 'th';
                switch (d % 10) { case 1: return "st"; case 2: return "nd"; case 3: return "rd"; default: return "th"; }
            };
            return d.toLocaleDateString('en-US', { month: 'short' }) + ' ' + day + nth(day) + ', ' + d.getFullYear();
        }

        function calculateAdvancedMetrics(filteredExps, filterMonthStr) {
            const today = new Date();
            const isCurrentMonth = today.toISOString().substring(0, 7) === filterMonthStr;
            const currentDayNum = isCurrentMonth ? today.getDate() : new Date(filterMonthStr + "-01").getDate();
            const daysInMonth = new Date(parseInt(filterMonthStr.split('-')[0]), parseInt(filterMonthStr.split('-')[1]), 0).getDate();
            
            const totalExp = filteredExps.reduce((s, e) => s + e.amount, 0);
            const balance = (appData.salary || 0) - totalExp;
            
            let totalSavings = appData.expenses.filter(e => e.category.includes('Savings')).reduce((s, e) => s + e.amount, 0);

            let avgDaily = isCurrentMonth && currentDayNum > 0 ? (totalExp / currentDayNum) : (totalExp / daysInMonth);
            let predictedEOM = avgDaily * daysInMonth;

            let healthScore = 100;
            if(appData.salary > 0) {
                let spendingVelocity = predictedEOM / appData.salary;
                healthScore = Math.max(0, 100 - (spendingVelocity * 100) + 10);
            } else if (totalExp > 0) { healthScore = 0; }
            
            return { totalExp, balance, totalSavings, avgDaily, predictedEOM, healthScore };
        }

        async function addExpense() {
            const subCategory = document.getElementById('subCategorySelect').value;
            const amount = Math.abs(parseFloat(document.getElementById('expAmount').value));
            const date = document.getElementById('expDate').value;
            
            if (!subCategory) { TechToast.fire({ icon: 'warning', title: 'Select category first' }); return; }
            if (isNaN(amount) || amount <= 0) { TechToast.fire({ icon: 'warning', title: 'Enter a valid positive amount' }); return; }
            
            const currentBalance = (appData.salary || 0) - appData.expenses.reduce((s, e) => s + e.amount, 0);
            if (amount > currentBalance) {
                Swal.fire({ title: 'Insufficient Balance!', text: `You only have Rs ${currentBalance.toLocaleString()} available. Please add salary first.`, icon: 'error', background: 'rgba(10,10,14,0.98)', confirmButtonColor: '#f43f5e' });
                return;
            }

            appData.usageCounts[subCategory] = (appData.usageCounts[subCategory] || 0) + 1;
            appData.expenses.push({ id: Date.now(), name: subCategory, amount, category: subCategory, date, time: new Date().toLocaleTimeString() });
            
            document.getElementById('expAmount').value = ''; 
            document.getElementById('monthFilter').value = date.substring(0, 7);
            await saveSystemData(); TechToast.fire({ icon: 'success', title: 'Added Successfully' }); toggleActionBox('close'); 
        }

        async function editExpense(id) {
            const exp = appData.expenses.find(e => e.id === id);
            const otherExpenses = appData.expenses.reduce((s, e) => s + e.amount, 0) - exp.amount;
            const maxAllowed = (appData.salary || 0) - otherExpenses;

            const { value: newAmt } = await Swal.fire({ 
                title: 'Update Amount', 
                html: `<p class="text-xs text-slate-400 mb-3">Editing record: <b class="text-cyan-400">${exp.name}</b></p>`, 
                input: 'number', 
                inputAttributes: { step: '0.01', min: '0' }, 
                inputValue: exp.amount, 
                showCancelButton: true, 
                confirmButtonColor: '#22d3ee', 
                background: 'rgba(10,10,14,0.98)' 
            });
            
            if (newAmt) {
                const finalAmt = Math.abs(parseFloat(newAmt));
                if (finalAmt > maxAllowed) {
                    Swal.fire({ title: 'Exceeds Balance', text: `You can only enter up to Rs ${maxAllowed.toLocaleString()} without going negative.`, icon: 'error', background: 'rgba(10,10,14,0.98)', confirmButtonColor: '#f43f5e' });
                    return;
                }
                if (finalAmt > 0) { exp.amount = finalAmt; await saveSystemData(); TechToast.fire({ icon: 'success', title: 'Amount Saved' }); }
            }
        }

                responsive: true, maintainAspectRatio: false, 
                events: interactEvents,
                interaction: { mode: 'nearest', intersect: true }, 
                onHover: (e, elements) => {
                    if (!isAutoChartPlay) {
                        clearTimeout(window.manualTooltipHideId);
                        if (elements && elements.length > 0) {
                            window.manualTooltipHideId = setTimeout(() => {
                                if (myChart && !isAutoChartPlay) {
                                    myChart.setActiveElements([]);
                                    myChart.tooltip.setActiveElements([]);
                                    myChart.update();
                                }
                            }, 1500);
                        }
                    }
                },
                plugins: { legend: { position: 'right', labels: { padding: 12, usePointStyle: true, pointStyle: 'circle', font: {size: 10, weight: '600'} } }, tooltip: { backgroundColor: 'rgba(10, 10, 14, 0.95)', titleFont: { size: 12 }, bodyFont: { size: 13, weight: 'bold' }, padding: 12, cornerRadius: 10, borderColor: 'rgba(34, 211, 238, 0.3)', borderWidth: 1 } } 
            };
            
            updateChartLabelsAndPills();

            if (currentChartMode === 0) {
                let sfSpent = (appData.salary === 0 && spent === 0) ? 1 : spent; let sfRem = (appData.salary === 0 && spent === 0) ? 1 : rem;
                cData = { labels: ['Spent', 'Balance'], datasets: [{ data: [sfSpent, sfRem], backgroundColor: ['#f43f5e', '#10b981'], borderColor: '#050507', borderWidth: 2, hoverOffset: 8 }] }; cOptions.cutout = '65%';
            } else if (currentChartMode === 1) {
                const cats = {}; filteredExps.forEach(e => { cats[e.category] = (cats[e.category] || 0) + e.amount; });
                const keys = Object.keys(cats).sort((a,b) => cats[b] - cats[a]); if(keys.length === 0) { keys.push("No Data"); cats["No Data"] = 1; }
                cData = { labels: keys, datasets: [{ data: keys.map(k => cats[k]), backgroundColor: keys.map((k, i) => syncPalette[i % syncPalette.length].hex), borderColor: '#050507', borderWidth: 2, hoverOffset: 8 }] }; cOptions.cutout = '65%'; cOptions.plugins.legend.display = false; 
            } else if (currentChartMode === 2) {
                cType = 'bar'; const sCats = {}; filteredExps.forEach(e => { sCats[e.category] = (sCats[e.category] || 0) + e.amount; });
                const keys = Object.keys(sCats).filter(k => sCats[k] > 0).sort((a,b) => sCats[b] - sCats[a]);
                cData = { labels: keys.map(k => k.length > 8 ? k.substring(0, 7) + '..' : k), datasets: [{ label: 'Amount', data: keys.map(k => sCats[k]), backgroundColor: keys.map((k, i) => syncPalette[i % syncPalette.length].hex), borderRadius: 6, barPercentage: 0.35, categoryPercentage: 0.7 }] };
                cOptions.plugins.legend.display = false; cOptions.scales = { x: { grid: { display: false }, ticks: { font: {size: 8, weight: '600'}, color: '#a1a1aa' } }, y: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { font: {size: 8}, color: '#71717a' } } };
            }
            
            myChart = new Chart(ctx, { type: cType, data: cData, options: cOptions });
            
            if(isAutoChartPlay) startTooltipCycle();
        }

        function downloadCurrentMonthReport() {
            const filterVal = document.getElementById('monthFilter').value;
            const filterText = document.getElementById('monthFilter').options[document.getElementById('monthFilter').selectedIndex].text;
            
            let filteredExps = appData.expenses.filter(e => e.date.startsWith(filterVal));
            
            if (filteredExps.length === 0) { 
                TechToast.fire({ icon: 'info', title: 'No data to export for this month' }); 
                return; 
            }
            
            exportToPhoto(filteredExps, filterText);
        }

        function exportToPhoto(filteredExps, reportTitleStr) {
            const oldReport = document.getElementById('tech-report-dom'); if(oldReport) oldReport.remove();
            const report = document.createElement('div');
            report.id = 'tech-report-dom';
            report.style.position = 'absolute'; report.style.left = '-9999px'; report.style.top = '0';
            report.style.width = '800px'; report.style.backgroundColor = '#050507'; 
            report.style.padding = '50px'; report.style.fontFamily = "'Poppins', sans-serif"; report.style.color = '#fff';

            const totalExp = filteredExps.reduce((s, e) => s + e.amount, 0);
            const balance = Math.max(0, (appData.salary || 0) - totalExp);

            const prettyDate = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
            const prettyTime = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });

            let expHtml = `<table style="width:100%; border-collapse: collapse; margin-top: 20px;"><thead><tr style="border-bottom:1px solid #22d3ee; color:#22d3ee; text-align:left; font-size:12px; letter-spacing:1px;"><th style="padding:15px 10px;">DATE</th><th style="padding:15px 10px;">DESCRIPTION</th><th style="padding:15px 10px; text-align:right;">AMOUNT</th></tr></thead><tbody>`;
            [...filteredExps].sort((a,b) => new Date(b.date) - new Date(a.date)).slice(0, 25).forEach(e => {
                expHtml += `<tr style="border-bottom:1px solid rgba(255,255,255,0.05); font-size:14px;"><td style="padding:15px 10px; color:#a1a1aa;">${formatBeautifulDate(e.date)}</td><td style="padding:15px 10px; font-weight:600;">${e.name}</td><td style="padding:15px 10px; text-align:right; font-weight:bold; color:#f43f5e;">Rs ${e.amount.toLocaleString()}</td></tr>`;
            });
            expHtml += `</tbody></table>`;

            report.innerHTML = `
                <div style="border: 1px solid rgba(34,211,238,0.2); padding:40px; border-radius:20px; background:rgba(255,255,255,0.02); position:relative; overflow:hidden;">
                    <div style="position:absolute; top:-150px; right:-150px; width:400px; height:400px; background:radial-gradient(circle, rgba(34,211,238,0.15) 0%, transparent 70%);"></div>
                    <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid rgba(255,255,255,0.08); padding-bottom:30px;">
                        <div><h1 style="margin:0; font-size:36px; font-weight:900; letter-spacing:0.5px;">Spend<span style="color:#22d3ee;">X</span></h1></div>
                        <div style="text-align:right; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.05); padding:10px 15px; border-radius:12px; z-index:10; position:relative;">
                            <div style="color:#a1a1aa; font-size:11px; letter-spacing:1px; margin-bottom:4px; text-transform:uppercase;">Generated On</div>
                            <div style="color:#fff; font-size:13px; font-weight:600;">${prettyDate} &nbsp;&bull;&nbsp; ${prettyTime}</div>
                        </div>
                    </div>
                    <div style="margin-top: 20px; font-size:18px; color:#22d3ee; font-weight:bold; letter-spacing: 2px; text-transform:uppercase;">MONTHLY SUMMARY FOR: ${reportTitleStr}</div>
                    <div style="display:flex; justify-content:space-between; margin-top:20px; background:rgba(0,0,0,0.4); padding:30px; border-radius:16px; border:1px solid rgba(255,255,255,0.04);">
                        <div><div style="font-size:11px; color:#a1a1aa; letter-spacing:1px; margin-bottom:4px; text-transform:uppercase;">Total Salary / Budget</div><div style="font-size:26px; font-weight:bold;">Rs ${(appData.salary || 0).toLocaleString()}</div></div>
                        <div><div style="font-size:11px; color:#f43f5e; letter-spacing:1px; margin-bottom:4px; text-transform:uppercase;">Total Spent</div><div style="font-size:26px; font-weight:bold; color:#f43f5e;">Rs ${totalExp.toLocaleString()}</div></div>
                        <div><div style="font-size:11px; color:#34d399; letter-spacing:1px; margin-bottom:4px; text-transform:uppercase;">Remaining Balance</div><div style="font-size:26px; font-weight:bold; color:#34d399;">Rs ${balance.toLocaleString()}</div></div>
                    </div>
                    ${expHtml}
                </div>
            `;
            document.body.appendChild(report);

            const overlay = document.getElementById('downloadOverlay');
            overlay.classList.remove('hidden');
            overlay.classList.add('flex');

            setTimeout(() => {
                html2canvas(report, { scale: 2, backgroundColor: '#050507', logging: false }).then(canvas => {
                    const link = document.createElement('a');
                    const dynamicTimeId = new Date().toISOString().slice(11,19).replace(/:/g,"-") + "-" + Math.floor(Math.random() * 1000);
                    link.download = `SpendX_Report_${reportTitleStr}_[${dynamicTimeId}].png`;
                    link.href = canvas.toDataURL('image/png'); link.click();
                    report.remove(); 
                    
                    overlay.classList.add('hidden');
                    overlay.classList.remove('flex');
                    TechToast.fire({ icon: 'success', title: 'Download Complete' });
                });
            }, 1000); 
        }
    </script>
</body>
</html>
